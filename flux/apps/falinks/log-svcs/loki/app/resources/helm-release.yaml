apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
spec:
  interval: 1h
  timeout: 15m
  chartRef:
    kind: OCIRepository
    name: loki
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    loki:
      storage:
        bucketNames:
          chunks: loki-chunk
          ruler: loki-ruler
          admin:  loki-admin
        type: s3
        s3:
          endpoint: "garage-main.object-store.svc.cluster.local:3900"
          accessKeyId: "${LOKI_ACCESS_KEY}"
          secretAccessKey: "${LOKI_SECRET_KEY}"

      # Recommended from docs for single node deployment
      commonConfig:
        replication_factor: 1
      schemaConfig:
        configs:
          - from: "2024-04-01"
            store: tsdb
            object_store: s3
            schema: v13
            index:
              prefix: loki_index_
              period: 24h
      pattern_ingester:
          enabled: true
      limits_config:
        allow_structured_metadata: true
        volume_enabled: true
      ruler:
        enable_api: true

    minio:
      enabled: false

    deploymentMode: SingleBinary

    singleBinary:
      replicas: 1
      extraArgs:
        - '-config.expand-env=true'
      extraEnv:
        - name: LOKI_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: loki-secrets
              key: LOKI_ACCESS_KEY
        - name: LOKI_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: loki-secrets
              key: LOKI_SECRET_KEY


    # Zero out replica counts of other deployment modes
    backend:
      replicas: 0
    read:
      replicas: 0
    write:
      replicas: 0
    ingester:
      replicas: 0
    querier:
      replicas: 0
    queryFrontend:
      replicas: 0
    queryScheduler:
      replicas: 0
    distributor:
      replicas: 0
    compactor:
      replicas: 0
    indexGateway:
      replicas: 0
    bloomPlanner:
      replicas: 0
    bloomBuilder:
      replicas: 0
    bloomGateway:
      replicas: 0